<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Carezza Rifa</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .font-heading { font-family: 'Cormorant Garamond', serif; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lavender: '#b5a7cb',
            peach: '#f8dcc0',
            lavLight: '#e8e2f0',
            peachLight: '#fdf0e4',
            lavDark: '#8a7aa6'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-white" style="background: linear-gradient(135deg, #fdf0e4 0%, #ffffff 40%, #e8e2f0 100%);">
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-xl bg-white/90 backdrop-blur rounded-3xl shadow-lg border border-lavLight p-6 sm:p-8 text-center">
      <h1 class="font-heading text-4xl text-lavDark font-bold mb-2">Dashboard</h1>
      <p class="text-sm text-lavDark/60 mb-6">Panel inicial del usuario</p>

      <div id="userBox" class="rounded-2xl bg-peachLight px-4 py-3 text-lavDark mb-6 hidden"></div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <a href="admin.html" class="w-full h-12 rounded-2xl bg-lavender text-white font-semibold hover:bg-lavDark transition flex items-center justify-center">
          Ir al admin actual
        </a>
        <a href="cliente.html" class="w-full h-12 rounded-2xl bg-white text-lavDark border border-lavLight font-semibold hover:bg-lavLight/30 transition flex items-center justify-center">
          Ir al cliente actual
        </a>
      </div>

      <button id="logoutBtn" class="mt-4 w-full h-12 rounded-2xl bg-white text-red-500 border border-red-200 font-semibold hover:bg-red-50 transition">
        Cerrar sesión
      </button>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js';
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js';

    if (!window.FIREBASE_CONFIG) {
      alert('Falta firebase-config.js');
      throw new Error('Falta firebase-config.js');
    }

    const app = initializeApp(window.FIREBASE_CONFIG);
    const auth = getAuth(app);

    const userBox = document.getElementById('userBox');
    const logoutBtn = document.getElementById('logoutBtn');

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      userBox.classList.remove('hidden');
      userBox.textContent = `Sesión iniciada: ${user.email}`;
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
