<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Carezza Rifa</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .font-heading { font-family: 'Cormorant Garamond', serif; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lavender: '#b5a7cb',
            peach: '#f8dcc0',
            lavLight: '#e8e2f0',
            peachLight: '#fdf0e4',
            lavDark: '#8a7aa6'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-white" style="background: linear-gradient(135deg, #fdf0e4 0%, #ffffff 40%, #e8e2f0 100%);">
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-md bg-white/90 backdrop-blur rounded-3xl shadow-lg border border-lavLight p-6 sm:p-8">
      <div class="text-center mb-6">
        <h1 class="font-heading text-4xl text-lavDark font-bold">Carezza Rifa</h1>
        <p class="text-sm text-lavDark/60 mt-2">Crea tu cuenta o inicia sesión</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-lavDark/70 uppercase tracking-wide mb-1">Correo</label>
          <input id="email" type="email" class="w-full px-4 py-3 rounded-2xl border border-lavLight focus:outline-none focus:ring-2 focus:ring-lavender/40" placeholder="tucorreo@gmail.com" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-lavDark/70 uppercase tracking-wide mb-1">Contraseña</label>
          <input id="password" type="password" class="w-full px-4 py-3 rounded-2xl border border-lavLight focus:outline-none focus:ring-2 focus:ring-lavender/40" placeholder="********" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
          <button id="registerBtn" class="w-full h-12 rounded-2xl bg-lavender text-white font-semibold hover:bg-lavDark transition">
            Crear cuenta
          </button>
          <button id="loginBtn" class="w-full h-12 rounded-2xl bg-white text-lavDark border border-lavLight font-semibold hover:bg-lavLight/30 transition">
            Iniciar sesión
          </button>
        </div>

        <button id="logoutBtn" class="w-full h-12 rounded-2xl bg-white text-red-500 border border-red-200 font-semibold hover:bg-red-50 transition hidden">
          Cerrar sesión
        </button>

        <div id="statusBox" class="text-sm rounded-2xl px-4 py-3 bg-peachLight text-lavDark/80 hidden"></div>
      </div>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js';

    function showStatus(message, isError = false) {
      const box = document.getElementById('statusBox');
      box.textContent = message;
      box.classList.remove('hidden');
      box.className = 'text-sm rounded-2xl px-4 py-3 ' + (isError
        ? 'bg-red-50 text-red-600'
        : 'bg-peachLight text-lavDark/80');
    }

    function clearStatus() {
      const box = document.getElementById('statusBox');
      box.classList.add('hidden');
      box.textContent = '';
    }

    if (!window.FIREBASE_CONFIG) {
      alert('Falta firebase-config.js');
      throw new Error('Falta firebase-config.js');
    }

    const app = initializeApp(window.FIREBASE_CONFIG);
    const auth = getAuth(app);

    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const registerBtn = document.getElementById('registerBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    registerBtn.addEventListener('click', async () => {
      clearStatus();
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();

      if (!email || !password) {
        showStatus('Debes escribir correo y contraseña.', true);
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        showStatus('Cuenta creada correctamente.');
        window.location.href = 'dashboard.html';
      } catch (error) {
        showStatus(error.message, true);
      }
    });

    loginBtn.addEventListener('click', async () => {
      clearStatus();
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();

      if (!email || !password) {
        showStatus('Debes escribir correo y contraseña.', true);
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showStatus('Sesión iniciada correctamente.');
        window.location.href = 'dashboard.html';
      } catch (error) {
        showStatus(error.message, true);
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        showStatus('Sesión cerrada.');
      } catch (error) {
        showStatus(error.message, true);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        showStatus(`Sesión activa: ${user.email}`);
        logoutBtn.classList.remove('hidden');
      } else {
        logoutBtn.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
